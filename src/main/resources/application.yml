spring:
  profiles:
    active: dev

  application:
    name: back

  output:
    ansi:
      enabled: ALWAYS

  jpa:
    properties:
      hibernate:
        format_sql: true
        show_sql: true
    show-sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
      file-size-threshold: 2KB

file:
  upload-dir: ./uploads

custom:
  jwt:
    secretKey: abcdefghijklmnopqrstuvwxyz0123456789abcdefghijklmnopqrstuvwxyz0123456789abcdefghijklmnopqrstuvwxyz0123456789
  accessToken:
    expirationSeconds: "#{60*20}"