server:
  forward-headers-strategy: native

spring:
  profiles:
    active: dev
  application:
    name: back
  config:
    import: optional:file:.env[.properties]

  output:
    ansi:
      enabled: ALWAYS

  jpa:
    properties:
      hibernate:
        format_sql: true
        show_sql: true
    show-sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
      file-size-threshold: 2KB

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${SPRING__SECURITY__OAUTH2__CLIENT__REGISTRATION__KAKAO__CLIENT_ID}
            scope: profile_nickname, profile_image
            client-name: Kakao
            authorization-grant-type: authorization_code
            redirect-uri: '{baseUrl}/{action}/oauth2/code/{registrationId}'

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  # Redis 설정 (WebSocket 등 다른 용도로만 사용)
  data:
    redis:
      host: localhost
      port: 6379
      # password: # 비밀번호가 있다면 설정

  # 🔴 Redis 캐시 제거 (성능 개선: 직렬화 오버헤드 제거)
  # cache:
  #   type: redis
  #   redis:
  #     time-to-live: 600000
  #     cache-null-values: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

file:
  upload-dir: ./uploads
  storage:
    provider: ${FILE_STORAGE_PROVIDER:local}
    path-prefix: ${FILE_STORAGE_PATH_PREFIX:${spring.profiles.active:dev}}
    oci:
      namespace: ${OCI_OBJECT_STORAGE_NAMESPACE:}
      bucket: ${OCI_OBJECT_STORAGE_BUCKET:}
      region: ${OCI_REGION:ap-chuncheon-1}
      par-expire-minutes: ${OCI_OBJECT_STORAGE_PAR_EXPIRE_MINUTES:30}

# Swagger 설정
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
    doc-expansion: none
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

custom:
  jwt:
    secretKey: abcdefghijklmnopqrstuvwxyz0123456789abcdefghijklmnopqrstuvwxyz0123456789abcdefghijklmnopqrstuvwxyz0123456789
  accessToken:
    expirationSeconds: "#{60*20}"
  websocket:
    allowed-origin-patterns:
      - http://localhost:3000

management:
  endpoints:
    web:
      exposure:
        include: health, metrics , prometheus, info, flyway
    metrics:
      tags:
        application: DevCourseApp
        env: dev
