ratelimit:
  enabled: false

spring:
  datasource:
    # OCI 원격 DB 연결 시 아래 env를 채우면 되고, 미설정 시 로컬 기본값으로 동작
    # - DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD
    # - DB_USE_SSL, DB_REQUIRE_SSL, DB_ALLOW_PUBLIC_KEY_RETRIEVAL
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:DevCourse}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=${DB_ALLOW_PUBLIC_KEY_RETRIEVAL:true}&useSSL=${DB_USE_SSL:false}&requireSSL=${DB_REQUIRE_SSL:false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:lldj123414}
    driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
      maximum-pool-size: 10            # AWS RDS t3.micro 기준
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000


  # JPA
  jpa:
    show-sql: false                    # 필수 - 로그 왜곡 방지
    hibernate:
      ddl-auto: validate               # create/update 절대 금지
    properties:
      hibernate:
        format_sql: false
        default_batch_fetch_size: 100


  # Redis 설정
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  # Cache 설정
  cache:
    type: redis
    redis:
      time-to-live: 600000  # 10분 (밀리초)
      cache-null-values: false

# 로그 레벨 최소화
logging:
  level:
    root: WARN
    com.back.global.initData: INFO              # INFO


# Actuator - Prometheus 수집용
management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, metrics
  metrics:
    export:
      prometheus:
        enabled: true