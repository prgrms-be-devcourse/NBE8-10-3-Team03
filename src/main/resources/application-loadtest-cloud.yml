ratelimit:
  enabled: false

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  datasource:
    # loadtest-cloud는 운영과 동일하게 env 주입을 강제한다.
    # - DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD
    # - DB_USE_SSL, DB_REQUIRE_SSL, DB_ALLOW_PUBLIC_KEY_RETRIEVAL
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=${DB_ALLOW_PUBLIC_KEY_RETRIEVAL:false}&useSSL=${DB_USE_SSL:true}&requireSSL=${DB_REQUIRE_SSL:true}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
      # 부하테스트 중 Pending 폭증을 줄이기 위해 환경변수 오버라이드 가능한 풀 설정을 사용한다.
      maximum-pool-size: ${DB_MAX_POOL_SIZE:30}
      minimum-idle: ${DB_MIN_IDLE:10}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:5000}
      validation-timeout: ${DB_VALIDATION_TIMEOUT_MS:2000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:300000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1200000}
      keepalive-time: ${DB_KEEPALIVE_TIME_MS:300000}


  # JPA
  jpa:
    show-sql: false                    # 필수 - 로그 왜곡 방지
    hibernate:
      ddl-auto: validate               # create/update 절대 금지
    properties:
      hibernate:
        show_sql: false
        format_sql: false
        default_batch_fetch_size: 100


  # Cache 설정 (loadtest-cloud에서는 Redis 미사용)
  cache:
    type: simple

# 로그 레벨 최소화
logging:
  level:
    root: WARN
    com.back.global.initData: INFO              # INFO


# Actuator - Prometheus 수집용
management:
  health:
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health, prometheus, metrics, flyway
  metrics:
    export:
      prometheus:
        enabled: true
