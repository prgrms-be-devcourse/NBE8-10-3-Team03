spring:
  datasource:
    # 운영/클라우드(OCI)에서는 반드시 env 주입
    # - DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD
    # - DB_USE_SSL, DB_REQUIRE_SSL, DB_ALLOW_PUBLIC_KEY_RETRIEVAL
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=${DB_ALLOW_PUBLIC_KEY_RETRIEVAL:false}&useSSL=${DB_USE_SSL:true}&requireSSL=${DB_REQUIRE_SSL:true}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        show_sql: false

  # Cache 설정 (운영에서는 Redis 미사용)
  cache:
    type: simple

management:
  health:
    redis:
      enabled: false

# 운영 환경 로그 설정
logging:
  level:
    root: WARN
    com.back.domain.auction: INFO
    com.back.domain.bid: INFO
    com.back.global.initData: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/application.log
    max-size: 10MB
    max-history: 30
