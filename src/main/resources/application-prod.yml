spring:
  datasource:
    url: jdbc:mysql://localhost:3306/DevCourse?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: root
    password: lldj123414
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  # Redis 설정 (운영 환경)
  data:
    redis:
      host: localhost
      port: 6379

  # Cache 설정
  cache:
    type: redis
    redis:
      time-to-live: 600000  # 10분 (밀리초)
      cache-null-values: false

# 운영 환경 로그 설정
logging:
  level:
    root: WARN
    com.back.domain.auction: INFO
    com.back.domain.bid: INFO
    com.back.global.initData: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/application.log
    max-size: 10MB
    max-history: 30
