spring:
  datasource:
    # OCI 원격 DB 연결 시 아래 env를 채우면 되고, 미설정 시 로컬 기본값으로 동작
    # - DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD
    # - DB_USE_SSL, DB_REQUIRE_SSL, DB_ALLOW_PUBLIC_KEY_RETRIEVAL
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:DevCourse}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=${DB_ALLOW_PUBLIC_KEY_RETRIEVAL:true}&useSSL=${DB_USE_SSL:false}&requireSSL=${DB_REQUIRE_SSL:false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:lldj123414}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: ${SPRING_JPA_SHOW_SQL:true}

  # Redis 설정 (개발 환경)
  # Docker Compose 환경: redis 컨테이너 사용
  # 로컬 환경: localhost:6379로 접근
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  # Cache 설정
  cache:
    type: redis
    redis:
      time-to-live: 600000  # 10분 (밀리초)
      cache-null-values: false

# 개발 환경 로그 설정
logging:
  level:
    root: INFO
    com.back.domain.auction: DEBUG
    com.back.domain.bid: DEBUG
    com.back.global.initData: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
