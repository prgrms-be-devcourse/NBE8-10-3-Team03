name: CD

on:
  workflow_dispatch:
  push:
    branches: [ "develop" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_repo: ${{ steps.meta.outputs.image_repo }}
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image metadata
        id: meta
        run: |
          IMAGE_REPO="${{ vars.IMAGE_NAME }}"
          if [ -z "${IMAGE_REPO}" ]; then
            IMAGE_REPO="ghcr.io/${GITHUB_REPOSITORY,,}"
          fi
          IMAGE_TAG="sha-${GITHUB_SHA::7}"
          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ vars.DOCKER_PLATFORMS || 'linux/arm64' }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_repo }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          [ -n "${{ secrets.OCI_HOST }}" ] || (echo "OCI_HOST empty" && exit 1)
          [ -n "${{ secrets.OCI_USER }}" ] || (echo "OCI_USER empty" && exit 1)
          [ -n "${{ secrets.OCI_SSH_KEY }}" ] || (echo "OCI_SSH_KEY empty" && exit 1)

      - name: Upload deploy compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_HOST }}
          port: ${{ secrets.OCI_PORT }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          source: docker-compose.deploy.yml
          target: ${{ vars.DEPLOY_PATH || '/home/ubuntu/app' }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_REPO: ${{ needs.build-and-push.outputs.image_repo }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONTAINER_NAME: ${{ vars.CONTAINER_NAME || 'back-app' }}
          APP_PORT: ${{ vars.APP_PORT || '8080' }}
        with:
          host: ${{ secrets.OCI_HOST }}
          port: ${{ secrets.OCI_PORT }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script_stop: true
          envs: IMAGE_REPO,IMAGE_TAG,DEPLOY_PATH,APP_ENV_FILE,GHCR_USER,GHCR_TOKEN,CONTAINER_NAME,APP_PORT
          script: |
            set -euo pipefail

            if [ -z "${DEPLOY_PATH}" ]; then
              DEPLOY_PATH="/home/${USER}/app"
            fi
            mkdir -p "${DEPLOY_PATH}"
            cd "${DEPLOY_PATH}"

            if [ -n "${APP_ENV_FILE}" ]; then
              printf "%s\n" "${APP_ENV_FILE}" > .env
            fi

            if [ ! -f ".env" ]; then
              echo ".env file not found in ${DEPLOY_PATH}"
              exit 1
            fi

            echo "IMAGE_TAG=${IMAGE_TAG}" > .deploy.env

            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

            if [ ! -f "docker-compose.deploy.yml" ]; then
              echo "docker-compose.deploy.yml not found in ${DEPLOY_PATH}"
              exit 1
            fi

            docker compose -f docker-compose.deploy.yml --env-file .deploy.env pull
            docker compose -f docker-compose.deploy.yml --env-file .deploy.env up -d --remove-orphans

            docker image prune -f || true

            for i in {1..20}; do
              status="$(curl -fsS -o /dev/null -w '%{http_code}' http://localhost:8080/actuator/health || true)"
              if [ "${status}" = "200" ]; then
                echo "Health check passed"
                exit 0
              fi
              sleep 5
            done

            echo "Health check failed"
            exit 1
