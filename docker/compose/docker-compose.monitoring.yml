services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-remote-write-receiver"
      - "--enable-feature=native-histograms"
    ports:
      - "9090:9090"
    volumes:
      - ${PWD}/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    networks: [perf, auction-network]

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      TZ: Asia/Seoul
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ${PWD}/docker/grafana/provisioning:/etc/grafana/provisioning
      - ${PWD}/docker/grafana/dashboards:/etc/grafana/dashboards
    depends_on:
      - prometheus
    networks: [perf]

networks:
  perf:
    name: perf-network
  auction-network:
    external: true
    name: auction-network

volumes:
  prom_data:
  grafana_data: